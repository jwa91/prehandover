version: 2

project_name: prehandover

builds:
  - id: prehandover
    main: ./cmd/prehandover
    binary: prehandover
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - >-
        -s -w
        -X github.com/jwa91/prehandover/internal/version.Current={{ .Version }}
        -X github.com/jwa91/prehandover/internal/version.Commit={{ .ShortCommit }}
        -X github.com/jwa91/prehandover/internal/version.Date={{ .Date }}
    hooks:
      # Codesign darwin binaries with Developer ID + hardened runtime.
      # No-op on linux and when MACOS_SIGN_IDENTITY is unset (CI).
      post:
        - cmd: 'scripts/codesign.sh "{{ .Target }}" "{{ .Path }}"'

archives:
  - id: default
    ids:
      - prehandover
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ title .Os }}_{{ if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^Merge "
      - "^docs:"
      - "^test:"
      - "^ci:"
  groups:
    - title: Features
      regexp: "^.*feat(\\(.+\\))??!?:.+$"
      order: 0
    - title: Fixes
      regexp: "^.*fix(\\(.+\\))??!?:.+$"
      order: 1
    - title: Performance
      regexp: "^.*perf(\\(.+\\))??!?:.+$"
      order: 2
    - title: Refactors
      regexp: "^.*refactor(\\(.+\\))??!?:.+$"
      order: 3
    - title: Chores
      regexp: "^.*chore(\\(.+\\))??!?:.+$"
      order: 4
    - title: Other
      order: 999

# Modern Homebrew distribution for pre-compiled binaries (ADR 0008 in
# jwa91/homebrew-tap). Publishes Casks/prehandover.rb back to the tap.
# `brew install jwa91/tap/prehandover` is unchanged — modern brew
# auto-detects the cask kind.
homebrew_casks:
  - name: prehandover
    ids:
      - default
    repository:
      owner: jwa91
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: https://github.com/jwa91/prehandover
    description: Unified agent-stop validation for repo-owned agent harness contracts
    license: MIT
    binaries: [prehandover]
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "feat(prehandover): cask update to {{ .Tag }}"

release:
  draft: false
  prerelease: auto
