name: Release

# Manual-only until CI has signing credentials (Developer ID .p12 +
# App Store Connect API key). Local releases via `make release
# VERSION=X.Y.Z` are the canonical path for now — see Makefile.
on:
  workflow_dispatch:
  # push:
  #   tags:
  #     - "v*"

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Setup Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@25e2cdc5eb1d7a04fdc45ff538f1a00e960ae128 # v8.0.0
        with:
          version: v2.12.2
          install-only: true

      - name: Run checks
        run: make check

  release:
    name: Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          version: v2.12.7
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: release
    steps:
      - name: Smoke release artifact
        env:
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -eu
          asset="prehandover_Linux_x86_64.tar.gz"
          base="https://github.com/${GH_REPO}/releases/download/${TAG}"
          curl -fsSLO "${base}/${asset}"
          curl -fsSLO "${base}/checksums.txt"
          grep "  ${asset}$" checksums.txt > "${asset}.sha256"
          sha256sum -c "${asset}.sha256"
          tar -xzf "${asset}"
          ./prehandover --version | grep "${TAG#v}"
          ./prehandover init --path /tmp/prehandover.toml
          ./prehandover validate --config /tmp/prehandover.toml
